<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PayTracker{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <a href="/requests" class="brand">PayTracker</a>
        {% if current_user %}
        <span class="user-info">{{ current_user.full_name }} <span class="badge">{{ current_user.role.value }}</span></span>
        <a href="/logout" class="logout">Выйти</a>
        {% endif %}
    </header>

    <main class="container">
        {% for f in flash_messages %}
        <div class="flash flash-{{ f.level }}">{{ f.message }}</div>
        {% endfor %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>

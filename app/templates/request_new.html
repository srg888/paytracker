{% extends "base.html" %}
{% block title %}Новая заявка — PayTracker{% endblock %}
{% block content %}
<h2>Новая заявка</h2>

<div class="type-tabs">
    <button type="button" class="active" onclick="showType('payment')">Платёж</button>
    <button type="button" onclick="showType('purchase')">Закупка</button>
    <button type="button" onclick="showType('consultation')">Консультация</button>
</div>

<form class="card" method="post" action="/requests/new" enctype="application/x-www-form-urlencoded">
    <input type="hidden" name="type" id="type-field" value="payment">

    <label>Название заявки</label>
    <input type="text" name="title" required>

    <div class="two-col">
        <div>
            <label>Подразделение (юрлицо)</label>
            <select name="division_id" required>
                {% for d in divisions %}
                <option value="{{ d.id }}">{{ d.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label>Ожидаемый срок исполнения</label>
            <input type="date" name="expected_date">
        </div>
    </div>

    <label>Описание</label>
    <textarea name="description" rows="2"></textarea>

    <!-- ПЛАТЁЖ -->
    <div class="type-section active" id="section-payment">
        <h3>Платёж</h3>
        <label>Описание / цель платежа</label>
        <textarea name="purpose" rows="2"></textarea>
        <label>Назначение платежа</label>
        <input type="text" name="payment_purpose">

        <div class="two-col">
            <div>
                <label>Сумма</label>
                <input type="number" step="0.01" name="amount">
            </div>
            <div>
                <label>Валюта</label>
                <select name="currency_id">
                    {% for c in currencies %}
                    <option value="{{ c.id }}">{{ c.code }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <h4>Реквизиты получателя</h4>
        <label>Получатель</label>
        <input type="text" name="recipient_name">
        <div class="two-col">
            <div><label>Страна получателя</label><input type="text" name="recipient_country"></div>
            <div><label>Адрес получателя (латиницей)</label><input type="text" name="recipient_address"></div>
        </div>
        <label>Банк получателя</label>
        <input type="text" name="recipient_bank">
        <div class="two-col">
            <div><label>Номер счёта / IBAN</label><input type="text" name="account_number_iban"></div>
            <div><label>SWIFT / BIC</label><input type="text" name="swift_bic"></div>
        </div>
        <label>Дополнительная платёжная информация</label>
        <textarea name="additional_payment_info" rows="2"></textarea>

        <label>Способ оплаты</label>
        <select name="payment_method" onchange="toggleAgent(this.value)">
            <option value="bank">Прямой платёж через банк</option>
            <option value="agent">Через платёжного агента</option>
        </select>
        <div id="agent-field">
            <label>Агент</label>
            <select name="agent_id">
                <option value="">—</option>
                {% for a in agents %}
                <option value="{{ a.id }}">{{ a.code }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <!-- ЗАКУПКА -->
    <div class="type-section" id="section-purchase">
        <h3>Закупка</h3>
        <label>Компания-покупатель</label>
        <select name="buyer_company_id">
            {% for bc in buyer_companies %}
            <option value="{{ bc.id }}">{{ bc.name }}</option>
            {% endfor %}
        </select>
        <label>Способ оплаты</label>
        <select name="purchase_payment_method">
            <option value="bank">Прямой платёж от компании-покупателя</option>
            <option value="agent">Через платёжного агента</option>
        </select>
        <label>Расчёт наценки / комментарий</label>
        <textarea name="markup_notes" rows="2"></textarea>
        <label>Дата поставки (если известна)</label>
        <input type="date" name="delivery_date">
    </div>

    <!-- КОНСУЛЬТАЦИЯ -->
    <div class="type-section" id="section-consultation">
        <h3>Консультация</h3>
        <label>Описание задачи / вопрос</label>
        <textarea name="question_description" rows="3"></textarea>
    </div>

    <button type="submit">Создать заявку (черновик)</button>
</form>

<script>
function showType(type) {
    document.getElementById('type-field').value = type;
    document.querySelectorAll('.type-section').forEach(el => el.classList.remove('active'));
    document.getElementById('section-' + type).classList.add('active');
    document.querySelectorAll('.type-tabs button').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
}
function toggleAgent(method) {
    document.getElementById('agent-field').style.display = method === 'agent' ? 'block' : 'none';
}
toggleAgent('bank');
</script>
{% endblock %}

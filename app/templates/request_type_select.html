{% extends "base.html" %}
{% block title %}Новая заявка — PayTracker{% endblock %}
{% block content %}

<h2>Создание заявки</h2>
<p style="color:#787774;margin-bottom:16px">Выберите тип заявки:</p>

<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
    <a href="/requests/new/payment" class="card" style="display:block;text-align:center;padding:32px 16px;text-decoration:none;color:inherit;cursor:pointer;border:1px solid #eaeaea;border-radius:8px;transition:border-color 0.2s">
        <div style="margin-bottom:12px">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2f3437" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <line x1="2" y1="10" x2="22" y2="10"/>
                <line x1="6" y1="14" x2="10" y2="14"/>
            </svg>
        </div>
        <div style="font-size:18px;font-weight:600">Платёж</div>
        <div style="font-size:13px;color:#787774;margin-top:8px">Платёж через банк или агента</div>
    </a>
    <a href="/requests/new/purchase" class="card" style="display:block;text-align:center;padding:32px 16px;text-decoration:none;color:inherit;cursor:pointer;border:1px solid #eaeaea;border-radius:8px;transition:border-color 0.2s">
        <div style="margin-bottom:12px">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2f3437" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                <line x1="12" y1="22.08" x2="12" y2="12"/>
            </svg>
        </div>
        <div style="font-size:18px;font-weight:600">Закупка</div>
        <div style="font-size:13px;color:#787774;margin-top:8px">Закупка через компанию-покупателя</div>
    </a>
    <a href="/requests/new/consultation" class="card" style="display:block;text-align:center;padding:32px 16px;text-decoration:none;color:inherit;cursor:pointer;border:1px solid #eaeaea;border-radius:8px;transition:border-color 0.2s">
        <div style="margin-bottom:12px">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2f3437" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
        </div>
        <div style="font-size:18px;font-weight:600">Консультация</div>
        <div style="font-size:13px;color:#787774;margin-top:8px">Запрос консультации/экспертизы</div>
    </a>
</div>

{% endblock %}
